name: 毎朝6時 占いデータ更新

on:
  schedule:
    # 毎朝6:00 JST = 前日21:00 UTC
    - cron: '0 21 * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests beautifulsoup4 lxml

      - name: 占いデータを取得して data.json を更新
        run: python fetch_data.py

      - name: data.json をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "データに変更なし、スキップします"
          else
            git commit -m "data: $(date +'%Y-%m-%d') 占いデータ自動更新"
            git push
          fi
